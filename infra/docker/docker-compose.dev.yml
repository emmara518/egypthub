version: "3.9"

services:
  # ===== PostgreSQL =====
  postgres:
    image: postgres:16-alpine
    container_name: egypthub-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: egypthub
      POSTGRES_PASSWORD: egypthub_secret_2024
      POSTGRES_DB: egypthub_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U egypthub -d egypthub_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Redis =====
  redis:
    image: redis:7-alpine
    container_name: egypthub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== API Gateway :4000 =====
  api-gateway:
    build:
      context: ../../services/api-gateway
      dockerfile: Dockerfile
    container_name: egypthub-api-gateway
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      AUTH_SERVICE_URL: http://auth-service:4001
      LISTINGS_SERVICE_URL: http://listings-service:4002
      BOOKINGS_SERVICE_URL: http://bookings-service:4003
      AMBASSADOR_SERVICE_URL: http://ambassador-service:4004
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: super-secret-jwt-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ===== Auth Service :4001 =====
  auth-service:
    build:
      context: ../../services/auth-service
      dockerfile: Dockerfile
    container_name: egypthub-auth-service
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      NODE_ENV: development
      PORT: 4001
      DATABASE_URL: postgresql://egypthub:egypthub_secret_2024@postgres:5432/egypthub_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: super-secret-jwt-key-change-in-production
      JWT_EXPIRATION: 7d
      SMS_PROVIDER: mock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ===== Listings Service :4002 =====
  listings-service:
    build:
      context: ../../services/listings-service
      dockerfile: Dockerfile
    container_name: egypthub-listings-service
    restart: unless-stopped
    ports:
      - "4002:4002"
    environment:
      NODE_ENV: development
      PORT: 4002
      DATABASE_URL: postgresql://egypthub:egypthub_secret_2024@postgres:5432/egypthub_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ===== Bookings Service :4003 =====
  bookings-service:
    build:
      context: ../../services/bookings-service
      dockerfile: Dockerfile
    container_name: egypthub-bookings-service
    restart: unless-stopped
    ports:
      - "4003:4003"
    environment:
      NODE_ENV: development
      PORT: 4003
      DATABASE_URL: postgresql://egypthub:egypthub_secret_2024@postgres:5432/egypthub_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: super-secret-jwt-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ===== Ambassador Service :4004 =====
  ambassador-service:
    build:
      context: ../../services/ambassador-service
      dockerfile: Dockerfile
    container_name: egypthub-ambassador-service
    restart: unless-stopped
    ports:
      - "4004:4004"
    environment:
      NODE_ENV: development
      PORT: 4004
      DATABASE_URL: postgresql://egypthub:egypthub_secret_2024@postgres:5432/egypthub_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: super-secret-jwt-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ===== Backend API (Monolith) :4010 =====
  backend:
    build:
      context: ../../services/backend
      dockerfile: Dockerfile
    container_name: egypthub-backend
    restart: unless-stopped
    ports:
      - "4010:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      API_PREFIX: api/v1
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003
      LOG_LEVEL: debug
      DATABASE_URL: postgresql://egypthub:egypthub_secret_2024@postgres:5432/egypthub_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: super-secret-jwt-access-key-change-in-production
      JWT_REFRESH_SECRET: super-secret-jwt-refresh-key-change-in-production
      THROTTLE_TTL: 60000
      THROTTLE_LIMIT: 120
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
